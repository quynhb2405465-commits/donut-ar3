<!DOCTYPE html>

<html>

<head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Polish Donut AR Menu</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>

body{margin:0;overflow:hidden;font-family:Arial,sans-serif;}

#infoBox{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);color:white;padding:12px 18px;border-radius:12px;text-align:center;z-index:999;display:none;max-width:300px;}

#title{font-size:20px;font-weight:bold;margin-bottom:5px;}

#price{color:#FFD700;font-size:18px;margin-bottom:5px;}

#desc{font-size:14px;}

</style>

</head>

<body>

<div id="infoBox">

<div id="title">🍩 POLISH DONUT</div>

<div id="price">35.000 VND</div>

<div id="desc">Traditional Polish donut with sweet glaze.</div>

</div>

<a-scene mindar-image="imageTargetSrc: targets.mind;" color-space="sRGB" renderer="colorManagement:true, physicallyCorrectLights" vr-mode-ui="enabled:false" device-orientation-permission-ui="enabled:false">

<a-assets>

<a-asset-item id="donut" src="donut.glb"></a-asset-item>

</a-assets>

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

<a-entity id="target" mindar-image-target="targetIndex: 0">

<a-entity id="modelWrapper" scale="0.005 0.005 0.005">

<a-gltf-model id="donutModel" src="#donut" position="0 0.1 0" rotation="0 0 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 6000"></a-gltf-model>

</a-entity>

</a-entity>

</a-scene>

<script>

window.addEventListener("load", () => {

const wrapper = document.querySelector("#modelWrapper");

const target = document.querySelector("#target");

const infoBox = document.querySelector("#infoBox");

let scale = 0.005;

let startDistance = 0;

let startX = 0;

let rotationY = 0;

target.addEventListener("targetFound", () => {

infoBox.style.display = "block";

wrapper.setAttribute("animation__appear", `property: scale; from: 0.001 0.001 0.001; to: 0.005 0.005 0.005; dur: 1200; easing: easeOutElastic;`);

});

target.addEventListener("targetLost", () => {

infoBox.style.display = "none";

});

function getDistance(t1, t2){const dx=t1.clientX-t2.clientX;const dy=t1.clientY-t2.clientY;return Math.sqrt(dx*dx+dy*dy);}

document.addEventListener("touchstart",(e)=>{

if(e.touches.length===1){startX=e.touches[0].clientX;}

if(e.touches.length===2){startDistance=getDistance(e.touches[0],e.touches[1]);}

});

document.addEventListener("touchmove",(e)=>{

if(e.touches.length===1){const currentX=e.touches[0].clientX;rotationY+=(currentX-startX)*0.5;wrapper.setAttribute("rotation",`0 ${rotationY} 0`);startX=currentX;}

if(e.touches.length===2){const newDistance=getDistance(e.touches[0],e.touches[1]);const delta=(newDistance-startDistance)*0.0002;scale+=delta;scale=Math.max(0.002,Math.min(0.03,scale));wrapper.setAttribute("scale",`${scale} ${scale} ${scale}`);startDistance=newDistance;}

});

});

</script>

</body>
</html>
