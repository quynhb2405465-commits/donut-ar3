<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Menu AR — Xem bánh trước khi gọi</title>
<meta name="description" content="Quét mã QR, xem bánh 3D ngay tại bàn." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>

<style>
  :root{
    --cocoa:#2A1810;
    --cocoa-deep:#1C0F0A;
    --cream:#FFF3DD;
    --cream-dim:#F2E4C4;
    --cherry:#C1272D;
    --cherry-dark:#8F1A1F;
    --mint:#8FBF9F;
    --gold:#D8A857;
    --line: rgba(255,243,221,0.16);
    --radius: 22px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, #3A2416 0%, var(--cocoa) 45%, var(--cocoa-deep) 100%);
    color:var(--cream);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  .ticket-band{
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px 0 0;
    opacity:.55;
  }
  .ticket-band span{
    width:6px;height:6px;border-radius:50%;
    background:var(--cream);
  }

  header{
    text-align:center;
    padding:28px 20px 20px;
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    letter-spacing:.18em;
    text-transform:uppercase;
    font-size:11px;
    color:var(--mint);
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:clamp(28px,6vw,42px);
    margin:6px 0 4px;
  }
  .sub{
    font-size:14px;
    color:var(--cream-dim);
    opacity:.75;
    max-width:340px;
    margin:0 auto;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:18px;
    padding:8px 20px 60px;
    max-width:820px;
    margin:0 auto;
  }

  .card{
    background:var(--cream);
    color:var(--cocoa);
    border-radius:var(--radius);
    padding:14px 12px 16px;
    text-align:center;
    cursor:pointer;
    border:none;
    font-family:inherit;
    position:relative;
    transition:transform .18s ease, box-shadow .18s ease;
    box-shadow:0 6px 0 rgba(0,0,0,0.18);
  }
  .card:active{transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,0.18);}

  .doily{
    width:100%;
    aspect-ratio:1;
    border-radius:50%;
    background:var(--cream-dim);
    margin-bottom:10px;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
    position:relative;
    mask-image: repeating-radial-gradient(circle at 50% 50%, #000 0 42%, transparent 42.2% 43%, #000 43.2% 100%);
  }
  .doily img{width:100%;height:100%;object-fit:cover;}
  .doily .fallback{
    font-family:'Fraunces', serif;
    font-size:34px;
  }

  .tag{
    position:absolute; top:8px; left:8px;
    background:var(--cherry); color:var(--cream);
    font-family:'IBM Plex Mono', monospace;
    font-size:10px; letter-spacing:.05em;
    padding:3px 8px; border-radius:20px;
  }

  .card h3{
    font-family:'Fraunces', serif;
    font-size:16px;
    margin:2px 0 4px;
    line-height:1.2;
  }
  .card .price{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--cherry-dark);
    letter-spacing:.02em;
  }

  /* ---------- AR viewer overlay ---------- */
  .viewer{
    position:fixed; inset:0;
    background:var(--cocoa-deep);
    display:none;
    flex-direction:column;
    z-index:50;
  }
  .viewer.open{display:flex;}

  .viewer-top{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px;
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:.05em;
  }
  .btn-round{
    width:38px;height:38px;border-radius:50%;
    background:var(--cream); color:var(--cocoa);
    border:none; font-size:18px; cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }

  model-viewer{
    width:100%;
    flex:1;
    --poster-color: transparent;
    background: radial-gradient(circle at 50% 40%, #3A2416, var(--cocoa-deep));
  }

  .viewer-bottom{
    padding:16px 18px 26px;
    background:var(--cream);
    color:var(--cocoa);
    border-radius:24px 24px 0 0;
  }
  .viewer-bottom h2{
    font-family:'Fraunces', serif;
    font-size:22px;
    margin:0 0 2px;
  }
  .viewer-bottom .price{
    font-family:'IBM Plex Mono', monospace;
    color:var(--cherry-dark);
    font-size:13px;
  }
  .viewer-bottom .desc{
    font-size:13px; opacity:.75; margin:8px 0 12px;
  }

  .actions{ display:flex; gap:10px; }
  .btn{
    flex:1;
    border:none; border-radius:14px;
    padding:12px 14px;
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px; letter-spacing:.03em;
    cursor:pointer;
  }
  .btn-primary{ background:var(--cherry); color:var(--cream); }
  .btn-ghost{ background:transparent; color:var(--cocoa); border:1.5px dashed var(--cocoa); opacity:.7; }

  .ingredients{
    margin-top:14px;
    border-top:1.5px dashed rgba(42,24,16,0.25);
    padding-top:12px;
    display:none;
  }
  .ingredients.open{display:block;}
  .ingredients .eyebrow2{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px; letter-spacing:.14em; text-transform:uppercase;
    opacity:.55; margin-bottom:8px;
  }
  .ingredients ul{ list-style:none; margin:0; padding:0; display:flex; flex-wrap:wrap; gap:8px; }
  .ingredients li{
    background:var(--cream-dim);
    padding:6px 10px; border-radius:20px;
    font-size:12.5px;
  }

  .hint{
    text-align:center; font-size:11px; opacity:.5;
    padding:2px 0 10px;
    font-family:'IBM Plex Mono', monospace;
  }

  footer{
    text-align:center; padding:20px; font-size:11px; opacity:.4;
    font-family:'IBM Plex Mono', monospace;
  }
</style>
</head>
<body>

  <div class="ticket-band"><span></span><span></span><span></span><span></span><span></span></div>

  <header>
    <div class="eyebrow">Quét mã · Xem bánh 3D</div>
    <h1>Menu AR</h1>
    <p class="sub">Chạm vào bánh để xem thành phần. Kéo để xoay, chụm ngón tay để phóng to / thu nhỏ.</p>
  </header>

  <div class="grid" id="grid"></div>

  <footer>làm bằng &lt;model-viewer&gt; — không cần cài app</footer>

  <!-- AR VIEWER -->
  <div class="viewer" id="viewer">
    <div class="viewer-top">
      <button class="btn-round" id="closeBtn" aria-label="Đóng">←</button>
      <span id="ticketNo">PHIẾU #—</span>
      <span style="width:38px"></span>
    </div>

    <model-viewer id="mv"
      camera-controls
      touch-action="pan-y"
      shadow-intensity="1.2"
      exposure="1"
      ar
      ar-modes="webxr scene-viewer quick-look"
      auto-rotate
      auto-rotate-delay="1500">
      <button slot="ar-button" class="btn" style="position:absolute;bottom:16px;left:16px;right:16px;background:var(--gold);color:var(--cocoa-deep)">
        📱 Xem bánh trên bàn (AR)
      </button>
    </model-viewer>

    <div class="viewer-bottom">
      <h2 id="cakeName">—</h2>
      <div class="price" id="cakePrice">—</div>
      <p class="desc" id="cakeDesc">—</p>

      <div class="actions">
        <button class="btn btn-primary" id="ingBtn">Xem thành phần</button>
        <button class="btn btn-ghost" id="resetBtn">Đặt lại góc nhìn</button>
      </div>

      <div class="ingredients" id="ingWrap">
        <div class="eyebrow2">Thành phần</div>
        <ul id="ingList"></ul>
      </div>
    </div>
    <div class="hint">chạm vào bánh để bật/tắt thành phần</div>
  </div>

<script>
let CAKES = [];

async function loadCakes(){
  const res = await fetch('data/cakes.json');
  CAKES = await res.json();
  renderGrid();
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if(id){
    const cake = CAKES.find(c => c.id === id);
    if(cake) openViewer(cake);
  }
}

function renderGrid(){
  const grid = document.getElementById('grid');
  grid.innerHTML = CAKES.map((c,i) => `
    <button class="card" onclick="goTo('${c.id}')">
      ${c.tag ? `<span class="tag">${c.tag}</span>` : ''}
      <div class="doily">
        ${c.poster ? `<img src="${c.poster}" alt="${c.name}" onerror="this.parentElement.innerHTML='<span class=fallback'>+String.fromCodePoint(0x1F370)+'</span>'">` : `<span class="fallback">🍰</span>`}
      </div>
      <h3>${c.name}</h3>
      <div class="price">${c.price}</div>
    </button>
  `).join('');
}

function goTo(id){
  const url = new URL(location.href);
  url.searchParams.set('id', id);
  history.pushState({}, '', url);
  const cake = CAKES.find(c => c.id === id);
  if(cake) openViewer(cake);
}

function openViewer(cake){
  const mv = document.getElementById('mv');
  mv.setAttribute('src', cake.glb);
  if(cake.usdz) mv.setAttribute('ios-src', cake.usdz);
  if(cake.poster) mv.setAttribute('poster', cake.poster);

  document.getElementById('cakeName').textContent = cake.name;
  document.getElementById('cakePrice').textContent = cake.price;
  document.getElementById('cakeDesc').textContent = cake.desc;
  document.getElementById('ticketNo').textContent = 'PHIẾU #' + cake.id.slice(0,4).toUpperCase();

  document.getElementById('ingList').innerHTML =
    cake.ingredients.map(i => `<li>${i}</li>`).join('');
  document.getElementById('ingWrap').classList.remove('open');

  document.getElementById('viewer').classList.add('open');
}

function closeViewer(){
  document.getElementById('viewer').classList.remove('open');
  const url = new URL(location.href);
  url.searchParams.delete('id');
  history.pushState({}, '', url);
}

document.getElementById('closeBtn').addEventListener('click', closeViewer);

document.getElementById('ingBtn').addEventListener('click', () => {
  document.getElementById('ingWrap').classList.toggle('open');
});

// Nhấn/chạm trực tiếp vào bánh cũng bật/tắt thành phần
document.getElementById('mv').addEventListener('click', () => {
  document.getElementById('ingWrap').classList.toggle('open');
});

document.getElementById('resetBtn').addEventListener('click', () => {
  const mv = document.getElementById('mv');
  mv.cameraOrbit = '0deg 75deg 105%';
  mv.fieldOfView = '30deg';
});

window.addEventListener('popstate', loadCakes);
loadCakes();
</script>
</body>
</html>
